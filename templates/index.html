{% extends "base.html" %}

{% block content %}
    <h1>devlog</h1>
    <div class="bio">
        <img src="/static/avatar.jpg" alt="avatar" class="avatar">
        <div>
            <h1>hi i'm nex!!!</h1>
            <p>welcome to my devlog, right now I'm working on creating an LLM from scratch and a chess engine!.</p>
            <p>Reach out at me@dnex.dev</p>
        </div>
    </div>
    <a href="/atom.xml" class="rss-link" title="RSS/Atom feed" aria-label="RSS feed">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 11a9 9 0 0 1 9 9"></path>
        <path d="M4 4a16 16 0 0 1 16 16"></path>
        <circle cx="5" cy="19" r="1"></circle>
    </svg>
</a>
    <ul class="post-list">
        {% for post in posts %}
        <li>
            <span class="post-date">{{ post.date }}</span>
            <a href="{{ post.url }}">{{ post.title }}</a>
        </li>
        {% endfor %}
    </ul>
{% endblock %}
